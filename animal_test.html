<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 내 동물상은?</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-3456978380293158">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3456978380293158" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle Theme">🌙</button>
        
        <header>
            <a href="index.html" class="back-link">← 메인으로 돌아가기 (로또 번호 추첨)</a>
            <h1>동물상 테스트</h1>
            <p class="subtitle">사진을 업로드하여 분석하는 나의 동물상</p>
        </header>

        <div class="test-section">
            <div id="image-container">
                <img id="face-image" src="#" alt="your image" style="display:none; max-width: 100%; max-height: 100%; border-radius: 15px;" />
                <div id="upload-placeholder">사진을 업로드해주세요</div>
            </div>
            <div id="label-container"></div>
            
            <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button type="button" id="upload-btn" onclick="document.getElementById('image-upload').click()">사진 선택하기</button>
            
            <div id="loading" style="display: none;">모델을 불러오는 중...</div>
        </div>
        
        <hr class="separator">

        <div class="affiliate-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xaqkdapv" method="POST" id="affiliate-form">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <hr class="separator">

        <div id="disqus_thread"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="animal_test.js"></script>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-akhocdyog4.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
