    <div class="container">
        <button id="theme-toggle" aria-label="Toggle Theme">🌙</button>

            <p class="subtitle">오늘의 행운을 잡으세요! 6개의 번호를 추첨합니다.</p>

                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
