    <meta charset="UTF-8">

    <title>성향 분석 연구소 | 나를 찾아가는 과학적 탐구</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon-home.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .question-card { display: none; }
        .question-card.active { display: block; animation: fadeIn 0.5s; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn { padding: 15px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--card-bg); color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; }
        .option-btn:hover { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        #result-area { display: none; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="럭키 로또 연구소 홈">🍀 럭키 로또 연구소</a>
            <div class="nav-links">
                <a href="index.html">홈</a>
                <a href="lotto.html">로또 번호 예측</a>
                <a href="about.html">연구소 소개</a>
                <button id="theme-toggle" aria-label="Toggle Theme">🌙</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>성향 분석 연구소 (Personality Lab)</h1>
            <p class="subtitle">몇 가지 질문을 통해 당신의 내면 세계를 과학적으로 분석합니다.</p>
        </header>

        <section class="tool-box" style="text-align: center;">
            <div id="quiz-area">
                <div class="question-card active" data-q="1">
                    <h3>Q1. 주말에 당신이 선호하는 휴식 방식은?</h3>
                    <div class="options">
                        <button class="option-btn" onclick="nextQuestion('E')">사람들과 어울리며 에너지를 얻는다.</button>
                        <button class="option-btn" onclick="nextQuestion('I')">집에서 혼자만의 시간을 가지며 재충전한다.</button>
                    </div>
                </div>
                <div class="question-card" data-q="2">
                    <h3>Q2. 문제를 해결할 때 당신의 스타일은?</h3>
                    <div class="options">
                        <button class="option-btn" onclick="nextQuestion('T')">논리적이고 객관적인 데이터를 신뢰한다.</button>
                        <button class="option-btn" onclick="nextQuestion('F')">주변 사람들의 감정과 조화를 우선시한다.</button>
                    </div>
                </div>
                <div class="question-card" data-q="3">
                    <h3>Q3. 새로운 계획을 세울 때 당신은?</h3>
                    <div class="options">
                        <button class="option-btn" onclick="nextQuestion('J')">체계적으로 일정을 짜고 계획대로 움직인다.</button>
                        <button class="option-btn" onclick="nextQuestion('P')">상황에 따라 유연하게 대처하는 것을 즐긴다.</button>
                    </div>
                </div>
            </div>

            <div id="result-area">
                <h2 id="result-title" style="color: var(--accent-color); margin-bottom: 20px;"></h2>
                <p id="result-desc" style="font-size: 1.1rem; margin-bottom: 30px;"></p>
                <button class="cta-button" onclick="location.reload()">다시 테스트하기</button>
            </div>
        </section>
    </div>

    <footer class="site-footer">
        <div class="footer-links">

            <a href="terms.html">이용약관</a>
        </div>
        <p class="copyright">© 2026 Lucky Lotto Research Institute. All rights reserved.</p>
    </footer>

    <script src="mbti.js"></script>
</body>
</html>
